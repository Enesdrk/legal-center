<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Center</title>
  <meta name="description" content="Central legal portal for all Enesdrk apps.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="bg-blur bg-blur-1" aria-hidden="true"></div>
  <div class="bg-blur bg-blur-2" aria-hidden="true"></div>

  <header class="header shell">
    <p class="eyebrow">Enesdrk Apps</p>
    <h1>Legal Center</h1>
    <p class="subtitle">Privacy Policy, Terms and Disclaimer pages for each application.</p>
  </header>

  <main class="shell">
    <section>
      <div id="apps-grid" class="apps-grid" aria-live="polite"></div>
      <p id="load-error" class="load-error" hidden>App list could not be loaded. Please check <code>apps/apps.json</code>.</p>
    </section>
  </main>

  <footer class="shell footer">
    <p>Single source of truth for app legal pages.</p>
  </footer>

  <script src="assets/app.js" defer></script>
</body>
</html>
